<!DOCTYPE html>
<html lang="en">

<head>
    <title>Receipt Total Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">

    <style>
        h1, h2, h3 {
            color :#392f74;
            font-family: 'IM Fell English';
        }

        body {
            font-family: 'Verdana', sans-serif;
            background-color: #f0f0f0;
            margin: 40px;
            font-weight: bold;
        }

        button {
            font-size: 16px;
            background-color: #649473;
            color: #000000;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #177a61;
        }

        input {
            font-size: 16px;
            padding: 8px;
        }

        img {
            width: 400px;
            margin-top: 20px;
            border: 2px solid #64618d;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>Receipt Total Calculator</h1>
    <h2>Emplid: 24576568</h2>
    <p>Upload a receipt image and enter the tax rate to calculate the new total.</p>
    <p>Choose a clear image for best results.</p>

    <input
        type="file"
        id="photo"
        accept="image/*"
        capture="environment"
    >

    <br><br>

    <input
        type="number"
        id="taxRate"
        value="10"
        step="1.0"
    >

    <br><br>

    <button onclick="sendReceipt()">Calculate Total</button>


    <h3>Preview</h3>
    <img id="preview"></image>


    <h3>Annotated Receipt</h3>
    <img id="result">

    
    <p id="output"></p>

    <script>

    const photoInput = document.getElementById('photo');
    const preview = document.getElementById('preview');


    // preview input
    photoInput.addEventListener('change', function() {

        const file = this.files[0];

        if (file) {
            preview.src = URL.createObjectURL(file);
        }
    });


    // send image to backend
    async function sendReceipt() {

        const file = document.getElementById('photo').files[0];

        const taxRate =
            document.getElementById('taxRate').value;

        const formData = new FormData();

        formData.append('photo', file);
        formData.append('tax_rate', taxRate);

        const response =
            await fetch('get_receipt_data', {
            method: 'POST',
            body: formData
        });

    const data = await response.json();


    // HANDLE ERRORS
    if (data.error) {

    document.getElementById('output').innerHTML =
        `Error: ${data.error}`;

    return;
}


    // show totals at bottom
    document.getElementById('output').innerHTML =
        `
        Original Total: $${data.subtotal}
        <br>
        New Total: $${data.new_total}
        `;
        // show annotated image
        document.getElementById('result').src =
            `data:${data.receipt.media_type};base64,${data.receipt.data}`;
    }

</script>
</body>
</html>
